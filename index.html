            --neon: #00ff88;
            --glass: rgba(7, 51, 34, 0.25);
            --text: #ffffff;
        }

        /* FIXED LOADER: No more black box glitch */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 136, 0.1);
            border-top-color: var(--neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -10%, var(--deep-green), transparent 80%);
            background-attachment: fixed;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* Apple-style Reveal Base */
        .reveal {
            opacity: 0;
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity;
        }

        /* Sideways entry points */
        .from-left { transform: translateX(-100px); }
        .from-right { transform: translateX(100px); }
        .from-bottom { transform: translateY(60px); }

        .reveal.active {
            opacity: 1;
            transform: translate(0, 0) !important;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .pfp {
            width: 125px;
            height: 125px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            object-fit: cover;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: -2px;
            margin: 0;
            font-weight: 800;
        }

        .section-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 30px;

        .section-title {

            font-size: 0.85rem;

            letter-spacing: 3px;

        .btn {

            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 24px;
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 14px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .btn:hover {
            background: var(--deep-green);
            border-color: var(--neon);
            transform: scale(1.03);
        }

        .btn:active { transform: scale(0.96); }

        .stats-row {
            display: grid;

        .stat-item {

    <script>
        // Smooth fade out for loader
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.visibility = 'hidden';
            }, 600);
        });

        // Stabilized Bidirectional Apple Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    // Only reset if item is truly out of the frame
                    const rect = entry.target.getBoundingClientRect();
                    if (rect.top > window.innerHeight || rect.bottom < 0) {
                         entry.target.classList.remove('active');
                    }
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => {
            observer.observe(el);
        });
    </script>
