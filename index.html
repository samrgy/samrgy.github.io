<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#073322">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>saammrgy | Hub</title>
    <style>
        :root {
            --top-green: #073322;
            --bg-black: #000000;
            --neon: #00ff88;
            --glass: rgba(7, 51, 34, 0.25);
            --text: #ffffff;
        }

        /* The 'Void' Killer: This fills the gap when pulling down */
        html {
            background-color: var(--top-green);
            margin: 0;
            padding: 0;
        }

        body {
            /* The modern 'little by little' fade */
            background: linear-gradient(180deg, 
                var(--top-green) 0%, 
                var(--bg-black) 40dvh, 
                var(--bg-black) 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100dvh;
        }

        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100dvh;
            background: var(--bg-black);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.1);
            border-top-color: var(--neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 40px 20px;
            /* Room for the iOS 'notch' area */
            padding-top: calc(40px + env(safe-area-inset-top));
        }

        .reveal {
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.33, 1, 0.68, 1);
            will-change: transform, opacity;
        }

        .from-left { transform: translateX(-50px); }
        .from-right { transform: translateX(50px); }
        .from-bottom { transform: translateY(30px); }

        .reveal.active {
            opacity: 1;
            transform: translate(0, 0) !important;
        }

        header { text-align: center; margin-bottom: 40px; }
        .pfp {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 { font-size: 2.6rem; letter-spacing: -2px; margin: 0; font-weight: 800; }

        .section-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 25px;
        }

        .section-title {
            color: var(--neon);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 18px;
            display: block;
            font-weight: 700;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 16px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .btn:hover { background: rgba(0, 255, 136, 0.1); border-color: var(--neon); }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .stat-item {
            text-align: center;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px 5px;
            border-radius: 16px;
        }

        .stat-num { display: block; font-size: 1.2rem; font-weight: 800; color: var(--neon); }
        .stat-label { font-size: 0.6rem; color: #777; text-transform: uppercase; }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 3px;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header class="reveal from-bottom">
            <img src="IMG_5132.png" class="pfp" alt="saammrgy">
            <h1>saammrgy</h1>
        </header>

        <div class="section-card reveal from-left">
            <span class="section-title">Projects</span>
            <a href="https://vt.tiktok.com/ZSu7kPJFP/" target="_blank" class="btn"><span>CPU ON MINECRAFT</span><i>→</i></a>
            <a href="https://vt.tiktok.com/ZSu7kGJQj/" target="_blank" class="btn"><span>16-BITS CALCULATOR</span><i>→</i></a>
            <a href="https://vt.tiktok.com/ZSu7kcQMg/" target="_blank" class="btn"><span>8-BITS CALCULATOR</span><i>→</i></a>
        </div>

        <div class="section-card reveal from-right">
            <span class="section-title">Instagram Content</span>
            <a href="https://www.instagram.com/p/DBodLZhg4T3/" target="_blank" class="btn"><span>boys abyss</span><i>📸</i></a>
            <a href="https://www.instagram.com/p/C-_QNm3ALx7/" target="_blank" class="btn"><span>goodnight punpun</span><i>📸</i></a>
            <a href="https://www.instagram.com/saammrgy/" target="_blank" class="btn"><span>full profile</span><i>🔗</i></a>
        </div>

        <div class="section-card reveal from-bottom">
            <span class="section-title">AniList Database</span>
            <div class="stats-row">
                <div class="stat-item"><span class="stat-num">124</span><span class="stat-label">Anime</span></div>
                <div class="stat-item"><span class="stat-num">1602</span><span class="stat-label">Total Episodes</span></div>
                <div class="stat-item"><span class="stat-num">23</span><span class="stat-label">Manga</span></div>
                <div class="stat-item"><span class="stat-num">1078</span><span class="stat-label">Chapters</span></div>
            </div>
            <a href="https://anilist.co/user/samrgy/animelist" target="_blank" class="btn" style="background: var(--neon); color: #000; border: none; justify-content: center;">
                <span style="font-weight: 800;">VIEW TRACKER</span>
            </a>
        </div>

        <footer>
            MADE BY SAAMMRGY
        </footer>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.visibility = 'hidden'; }, 500);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const rect = entry.target.getBoundingClientRect();
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    // Stricter check: Only remove if fully out of view
                    if (rect.top > window.innerHeight || rect.bottom < 0) {
                        entry.target.classList.remove('active');
                    }
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.reveal').forEach((el) => { observer.observe(el); });
    </script>
</body>
</html>
