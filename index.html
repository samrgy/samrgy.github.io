<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saammrgy | Hub</title>
    <style>
        :root {
            --bg-base: #000000;
            --accent-green: #073322;
            --glow-green: #00ff88;
            --glass: rgba(7, 51, 34, 0.25);
            --text-main: #ffffff;
            --text-dim: #8892b0;
        }

        /* Infinity Edge & Animated Background */
        body {
            background-color: var(--bg-base);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            overflow-x: hidden;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { background-image: radial-gradient(circle at 50% 0%, var(--accent-green), transparent 500px); }
            100% { background-image: radial-gradient(circle at 50% 10%, #0a4d33, transparent 700px); }
        }

        .container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin: 40px 0 30px;
        }

        /* Profile Picture with Pulse Effect */
        .header-pfp {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            border: 3px solid var(--glow-green);
            background-color: var(--accent-green);
            object-fit: cover;
            margin-bottom: 15px;
            animation: pfpPulse 3s infinite ease-in-out;
            transition: transform 0.3s;
        }

        @keyframes pfpPulse {
            0% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
            50% { box-shadow: 0 0 35px rgba(0, 255, 136, 0.5); }
            100% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        }

        .header-pfp:hover {
            transform: scale(1.08) rotate(2deg);
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 15px var(--glow-green);
        }

        /* Glassmorphism Sections */
        .section-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: 0.3s;
        }

        .section-card:hover {
            border-color: rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .username {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--glow-green);
            text-transform: lowercase;
        }

        /* TikTok Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .video-link {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid rgba(0,255,136,0.2);
            aspect-ratio: 9 / 16;
            background: linear-gradient(135deg, #02120c, var(--accent-green));
            transition: all 0.2s ease;
        }

        .video-link:hover {
            border-color: var(--glow-green);
            box-shadow: 0 0 15px rgba(0,255,136,0.4);
        }

        .video-link:active { transform: scale(0.92); }

        .play-icon {
            color: rgba(255,255,255,0.9);
            font-size: 2rem;
            opacity: 0.7;
        }

        /* Buttons */
        .action-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,136,0.15);
            padding: 16px;
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .action-link:hover {
            background: var(--accent-green);
            border-color: var(--glow-green);
        }

        .action-link:active { transform: scale(0.96); }

        /* Manga Tags */
        .manga-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background: rgba(0, 255, 136, 0.05);
            color: var(--glow-green);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>
</head>
