<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About saammrgy</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-green: #073322; /* Your color */
            --glow-green: #00ff88;
            --glass: rgba(7, 51, 34, 0.2);
            --text-main: #ffffff;
            --text-dim: #8892b0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, var(--accent-green), transparent 600px);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        header {
            text-align: center;
            margin: 30px 0 20px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: -1.5px;
            margin: 0;
            background: linear-gradient(180deg, #fff, #777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Main PFP */
        .header-pfp {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-green);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0,255,136, 0.1);
            margin-bottom: 15px;
        }

        /* Glass Cards */
        .section-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            transition: border-color 0.3s ease;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .username {
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: -0.5px;
        }

        /* TikTok Thumbnail Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .video-link {
            display: block;
            position: relative;
            text-decoration: none;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
            aspect-ratio: 9 / 16; /* TikTok vertical ratio */
        }

        .video-link:hover {
            transform: scale(1.05);
            border-color: var(--glow-green);
        }

        .video-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.8);
            font-size: 2.5rem;
            transition: opacity 0.3s;
        }

        .video-link:hover .play-overlay {
            opacity: 0.5;
        }

        /* Button Action Links */
        .action-link {
            display: block;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            color: var(--text-main);
            text-decoration: none;
            transition: 0.3s ease;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .action-link:hover {
            background: var(--accent-green);
            border-color: var(--glow-green);
            box-shadow: 0 0 10px rgba(0,255,136,0.1);
        }

        /* AniList Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--glow-green);
            letter-spacing: -1px;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-dim);
            font-size: 0.7rem;
        }
    </style>
</head>
